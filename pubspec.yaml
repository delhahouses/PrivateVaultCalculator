name: private_vault_calculator
description: A beautiful and secure Private Vault Calculator application built with Flutter 3.x.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Security & Authentication
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3

  # File Management & Utilities
  path_provider: ^2.1.3
  file_picker: ^8.0.3
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3

  # Media & PDF Viewers
  photo_view: ^0.14.0
  video_player: ^2.8.6
  audioplayers: ^6.0.0
  flutter_pdfview: ^1.3.2

  # Icons
  cupertino_icons: ^1.0.6
  encrypt: ^5.0.3
  flutter_jailbreak_detection: ^1.10.0
  image_picker: ^1.2.3
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "C:\\Users\\dhsti\\Downloads\\app_icon_512x512.png.png"
