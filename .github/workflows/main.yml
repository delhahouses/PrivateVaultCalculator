jobs:
  build:
    name: Test, Analyze and Build APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Java Development Kit (JDK) 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Automatically caches Gradle directories

      # Step 3: Setup Flutter SDK environment
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:${{ hashFiles('**/pubspec.lock') }}"

      # Step 4: Print tools version info for debugging and verification
      - name: Verify Flutter and Java Installation
        run: |
          flutter --version
          java -version

      # Step 5: Install project dependencies
      - name: Install dependencies
        run: flutter pub get

      # Step 6: Validate Dart code format
      - name: Check code formatting
        run: dart format --output=none --set-exit-if-changed .

      # Step 7: Analyze codebase for static analysis warnings/errors
      - name: Analyze code
        run: flutter analyze

      # Step 8: Run unit/widget tests if a test suite exists
      - name: Run tests
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test directory found. Skipping tests."
          fi
        shell: bash

      # Step 9: Configure Keystore signing credentials dynamically from repository secrets.
      # Decodes the keystore file and writes key.properties if the secret is available.
      - name: Setup Keystore Signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
        shell: bash

      # Step 10: Build Android Release APK
      - name: Build Release APK
        run: flutter build apk --release

      # Step 11: Build Android App Bundle (AAB) for Google Play release
      - name: Build Release App Bundle
        run: flutter build appbundle --release

